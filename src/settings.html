<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/styles.css" />
        <title>OPS | Dashboard</title>
    </head>
    <body>
        <div id="navbar">OPS</div>
        <div class="settings-field">
            <div class="settings-header">Leagues</div>
            <div class="settings-options">
                <label>
                    <input type="checkbox" id="nfl">
                    NFL
                </label>
                <label>
                    <input type="checkbox" id="nba">
                    NBA
                </label>
                <label>
                    <input type="checkbox" id="mlb">
                    MLB
                </label>
                <label>
                    <input type="checkbox" id="nhl">
                    NHL
                </label>
            </div>
        </div>
        <hr>
        <div class="settings-field">
            <div class="settings-header">Clock</div>
            <div class="settings-options">
                <label>
                    <input type="checkbox" id="military_format">
                    24 Hour Format
                </label>
            </div>
        </div>
        <hr>
        <div class="settings-field">
            <button type="button" id="save" style="margin-bottom: 5px;">Save</button>
        </div>
        <script src="../scripts/settings.js"></script>
    </body>
</html>
